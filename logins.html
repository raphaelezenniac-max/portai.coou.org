<!DOCTYPE html>
<html lang="en">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>COOU Portal Login</title>
      <!-- Using Inter font for a clean, modern look -->
      <link href="https://googleapis.com" rel="stylesheet">
      <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }
  
        body {
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
            padding: 80px 20px;
        }
        
        .login-container {
            width: 100%;
            max-width: 400px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .header img {
            width: 100%;
            border-top-left-radius: 4px;
            border-top-right-radius: 4px;
        }
        
        .header h1 {
            font-size: 20px;
            color: #002d62; /* Navy blue shade */
            margin-bottom: 12px;
        }
        
        .subtitle {
            font-size: 14px;
            color: #666;
        }
        
        /* Input Styles */
        .input-group {
            margin-bottom: 15px;
            padding: 0px 6px;
        }
        
        .input-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 12px;
            font-size: 13px;
        }
        
        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        
        .password-wrapper {
            position: relative;
        }
        
        .lock-icon {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            color: #999;
        }
        
        .forgot-password {
            text-align: right;
            margin-bottom: 25px;
            padding: 0px 6px;
        }
        
        .forgot-password a {
            text-decoration: none;
            font-size: 14px;
            color: #333;
        }
        
        /* Footer Section */
        .footer-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #ddd;
            padding: 10px 6px;
        }
        
        .footer-actions p {
            font-size: 14px;
        }
        
        .footer-actions a {
            color: #0056b3;
            text-decoration: none;
            font-weight: 500;
        }
        
        .sign-in-btn {
            background: #0056b3;
            border: none;
            padding: 12px 10px;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .sign-in-btn a {
          color: white;
        }
        
        /* Red Chat Button */
        .chat-button {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background-color: #e31e24;
            color: white;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }
  
      </style>
  </head>
  <body>
  
      <div class="login-container">
          <!-- Logo Section -->
          <div class="header">
              <img src="images/school-logo.jpg" alt="school-badge">
              <h1>Welcome to COOU</h1>
              <p class="subtitle">Access your portal</p>
          </div>
  
          <!-- Form Section -->
          <form>
              <div class="input-group">
                  <label for="username">Username</label>
                  <input type="text" id="username" placeholder="Enter username" required>
              </div>
  
              <div class="input-group">
                  <label for="password">Password</label>
                  <div class="password-wrapper">
                      <input type="password" id="password" placeholder="Enter password" required>
                      <span class="lock-icon">🔒</span>
                  </div>
              </div>
  
              <div class="forgot-password">
                  <a href="#">Forgot Password?</a>
              </div>
  
              <div class="footer-actions">
                  <p>New Student? <a href="#">Verify account</a></p>
                  <button type="submit" class="sign-in-btn">
                    <a href="dash.html">Sign in</a>
                  </button>
              </div>
          </form>
      </div>
  
      <!-- Floating Chat Button -->
      <div class="chat-button">
          Chat
      </div>
  
  </body>
</html>
